<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      .icon-bg {
        fill: #f0f4ff;
      }
      
      .icon-primary {
        fill: #0052CC;
      }
      
      .icon-accent {
        stroke: #0052CC;
        stroke-width: 2;
        fill: none;
      }
    </style>
  </defs>
  
  <!-- WHATSAPP BOT ICON -->
  <g id="whatsapp-bot">
    <!-- Background -->
    <circle cx="60" cy="60" r="50" class="icon-bg"/>
    
    <!-- Chat Bubble -->
    <path d="M30 35 L90 35 C95 35 100 40 100 45 L100 75 C100 80 95 85 90 85 L50 85 L40 100 L45 85 L45 85 C40 85 30 80 30 75 L30 45 C30 40 35 35 40 35 Z" class="icon-primary"/>
    
    <!-- Bot indicator (small circle inside) -->
    <circle cx="65" cy="60" r="6" fill="white"/>
  </g>
  
  <!-- WEBSITE ICON -->
  <g id="website">
    <!-- Background -->
    <circle cx="200" cy="60" r="50" class="icon-bg"/>
    
    <!-- Browser window -->
    <rect x="165" y="25" width="70" height="70" rx="4" class="icon-primary" opacity="0.15"/>
    <rect x="165" y="25" width="70" height="15" rx="4" class="icon-primary"/>
    
    <!-- Browser address bar -->
    <line x1="170" y1="35" x2="225" y2="35" class="icon-accent" stroke-linecap="round"/>
    
    <!-- Content lines -->
    <line x1="170" y1="50" x2="225" y2="50" class="icon-accent" stroke-linecap="round"/>
    <line x1="170" y1="60" x2="215" y2="60" class="icon-accent" stroke-linecap="round"/>
    <line x1="170" y1="70" x2="225" y2="70" class="icon-accent" stroke-linecap="round"/>
    <line x1="170" y1="80" x2="210" y2="80" class="icon-accent" stroke-linecap="round"/>
  </g>
  
  <!-- SOCIAL MEDIA ICON -->
  <g id="social-media">
    <!-- Background -->
    <circle cx="340" cy="60" r="50" class="icon-bg"/>
    
    <!-- Phone -->
    <rect x="315" y="30" width="50" height="60" rx="6" class="icon-accent"/>
    
    <!-- Screen -->
    <rect x="320" y="35" width="40" height="45" rx="2" fill="#0052CC" opacity="0.1"/>
    
    <!-- Social indicators (dots) -->
    <circle cx="325" cy="45" r="2" class="icon-primary"/>
    <circle cx="340" cy="45" r="2" class="icon-primary"/>
    <circle cx="355" cy="45" r="2" class="icon-primary"/>
    
    <!-- Activity lines -->
    <line x1="325" y1="55" x2="355" y2="55" class="icon-accent" stroke-linecap="round" stroke-width="1.5"/>
    <line x1="325" y1="63" x2="350" y2="63" class="icon-accent" stroke-linecap="round" stroke-width="1.5"/>
  </g>
  
  <!-- SEO ICON -->
  <g id="seo">
    <!-- Background -->
    <circle cx="480" cy="60" r="50" class="icon-bg"/>
    
    <!-- Magnifying glass -->
    <circle cx="470" cy="50" r="20" class="icon-accent"/>
    <line x1="485" y1="65" x2="495" y2="75" class="icon-accent" stroke-linecap="round"/>
    
    <!-- Magnifying glass reflection/sparkle -->
    <circle cx="465" cy="45" r="2" class="icon-primary"/>
  </g>
  
  <!-- AUTOMATION ICON -->
  <g id="automation">
    <!-- Background -->
    <circle cx="60" cy="200" r="50" class="icon-bg"/>
    
    <!-- Gear 1 -->
    <circle cx="50" cy="190" r="12" class="icon-primary" opacity="0.2"/>
    <circle cx="50" cy="190" r="8" fill="white"/>
    <circle cx="50" cy="190" r="4" class="icon-primary"/>
    
    <!-- Gear 2 -->
    <circle cx="75" cy="215" r="12" class="icon-primary" opacity="0.2"/>
    <circle cx="75" cy="215" r="8" fill="white"/>
    <circle cx="75" cy="215" r="4" class="icon-primary"/>
    
    <!-- Connection line -->
    <line x1="58" y1="198" x2="67" y2="207" class="icon-primary" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Third gear (partial) -->
    <circle cx="70" cy="170" r="10" class="icon-primary" opacity="0.15"/>
  </g>
  
  <!-- FULL PACKAGE / PREMIUM ICON -->
  <g id="premium">
    <!-- Background (gradient effect) -->
    <circle cx="200" cy="200" r="50" fill="url(#gradient-premium)"/>
    
    <!-- Gift box -->
    <rect x="165" y="175" width="70" height="50" rx="2" class="icon-accent"/>
    
    <!-- Ribbon top -->
    <line x1="165" y1="190" x2="235" y2="190" stroke="#0052CC" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Ribbon vertical -->
    <line x1="200" y1="175" x2="200" y2="225" stroke="#0052CC" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Bow -->
    <circle cx="190" cy="185" r="4" class="icon-primary"/>
    <circle cx="210" cy="185" r="4" class="icon-primary"/>
    
    <!-- Shine star -->
    <path d="M200 160 L202 168 L210 168 L204 173 L206 181 L200 177 L194 181 L196 173 L190 168 L198 168 Z" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <!-- Define gradient -->
  <defs>
    <linearGradient id="gradient-premium" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003BA3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- STANDALONE ICONS (for reference/usage) -->
  <g id="legend">
    <!-- Title -->
    <text x="300" y="180" font-size="14" font-weight="700" fill="#1a1a1a" text-anchor="middle">Plan Icons (Standalone)</text>
    
    <!-- Icons in a row -->
    <!-- Bot -->
    <circle cx="340" cy="240" r="20" class="icon-bg"/>
    <path d="M330 230 L350 230 C353 230 355 232 355 235 L355 250 C355 253 353 255 350 255 L340 255 L332 265 L337 255 L337 255 C335 255 330 253 330 250 L330 235 C330 232 332 230 335 230 Z" class="icon-primary"/>
    <circle cx="343" cy="242" r="2" fill="white"/>
    <text x="340" y="280" font-size="12" fill="#666" text-anchor="middle">Bot</text>
    
    <!-- Website -->
    <circle cx="400" cy="240" r="20" class="icon-bg"/>
    <rect x="385" y="225" width="30" height="30" rx="2" class="icon-primary" opacity="0.15"/>
    <rect x="385" y="225" width="30" height="8" rx="2" class="icon-primary"/>
    <line x1="388" y1="231" x2="412" y2="231" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <line x1="388" y1="238" x2="412" y2="238" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <line x1="388" y1="245" x2="408" y2="245" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <line x1="388" y1="252" x2="412" y2="252" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <text x="400" y="280" font-size="12" fill="#666" text-anchor="middle">Website</text>
    
    <!-- Social -->
    <circle cx="460" cy="240" r="20" class="icon-bg"/>
    <rect x="445" y="220" width="30" height="40" rx="3" class="icon-accent"/>
    <rect x="450" y="225" width="20" height="28" rx="1" fill="#0052CC" opacity="0.1"/>
    <circle cx="453" cy="235" r="1" class="icon-primary"/>
    <circle cx="460" cy="235" r="1" class="icon-primary"/>
    <circle cx="467" cy="235" r="1" class="icon-primary"/>
    <line x1="453" y1="242" x2="467" y2="242" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <line x1="453" y1="248" x2="465" y2="248" class="icon-accent" stroke-linecap="round" stroke-width="1"/>
    <text x="460" y="280" font-size="12" fill="#666" text-anchor="middle">Social</text>
    
    <!-- SEO -->
    <circle cx="520" cy="240" r="20" class="icon-bg"/>
    <circle cx="512" cy="235" r="10" class="icon-accent"/>
    <line x1="520" y1="243" x2="528" y2="251" class="icon-accent" stroke-linecap="round"/>
    <circle cx="509" cy="232" r="1" class="icon-primary"/>
    <text x="520" y="280" font-size="12" fill="#666" text-anchor="middle">SEO</text>
  </g>
</svg>
