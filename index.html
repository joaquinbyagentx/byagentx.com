<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://byagentx.com/">
  <link rel="canonical" href="https://byagentx.com/">
  <title>byAgentX</title>
  <script>
    const target = new URL('https://byagentx.com');
    target.pathname = window.location.pathname;
    target.search = window.location.search;
    target.hash = window.location.hash;
    window.location.replace(target.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="https://byagentx.com/">byagentx.com</a>.</p>
</body>
</html>
