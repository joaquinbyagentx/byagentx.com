<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joaquin — AgentX Digital Business Card</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    /* Subtle animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card-wrapper {
      position: relative;
      z-index: 1;
    }

    .card {
      width: 400px;
      min-height: 220px;
      background: linear-gradient(135deg, #111118 0%, #16161f 60%, #0e1620 100%);
      border: 1px solid rgba(0, 212, 255, 0.18);
      border-radius: 16px;
      padding: 28px 28px 24px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0, 212, 255, 0.06),
        0 4px 24px rgba(0, 0, 0, 0.6),
        0 0 60px rgba(0, 212, 255, 0.06);
      animation: cardGlow 4s ease-in-out infinite alternate;
    }

    @keyframes cardGlow {
      from { box-shadow: 0 0 0 1px rgba(0,212,255,0.06), 0 4px 24px rgba(0,0,0,0.6), 0 0 60px rgba(0,212,255,0.06); }
      to   { box-shadow: 0 0 0 1px rgba(0,212,255,0.14), 0 4px 32px rgba(0,0,0,0.7), 0 0 80px rgba(0,212,255,0.12); }
    }

    /* Decorative corner accent */
    .card::before {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    /* Bottom stripe */
    .card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, #00b8d9, transparent);
      opacity: 0.6;
    }

    /* Top row: icon + name/title */
    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .avatar {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,180,220,0.08));
      border: 1px solid rgba(0,212,255,0.25);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      position: relative;
    }

    .avatar::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      box-shadow: inset 0 0 10px rgba(0,212,255,0.08);
    }

    .name-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .company-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00d4ff;
      opacity: 0.85;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #f0f4f8;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .title {
      font-size: 12px;
      font-weight: 400;
      color: rgba(240,244,248,0.5);
      letter-spacing: 0.02em;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, rgba(0,212,255,0.15), rgba(0,212,255,0.05), transparent);
      margin-bottom: 16px;
    }

    /* Tagline */
    .tagline {
      font-size: 11.5px;
      font-style: italic;
      color: rgba(0,212,255,0.75);
      margin-bottom: 18px;
      letter-spacing: 0.01em;
      line-height: 1.5;
    }

    .tagline::before { content: '"'; }
    .tagline::after  { content: '"'; }

    /* Contact row */
    .contact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: rgba(240,244,248,0.65);
      font-size: 11.5px;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .contact-item:hover { color: #00d4ff; }

    .contact-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .contact-item:hover .contact-icon { opacity: 1; }

    /* Responsive */
    @media (max-width: 440px) {
      .card {
        width: 100%;
        min-width: 0;
        padding: 22px 20px 20px;
      }
      .contact-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="card-wrapper">
    <div class="card">

      <div class="card-header">
        <div class="avatar">🤖</div>
        <div class="name-block">
          <span class="company-badge">AgentX</span>
          <span class="name">Joaquin</span>
          <span class="title">AI Automation Agent</span>
        </div>
      </div>

      <div class="divider"></div>

      <p class="tagline">AI automation for businesses that want results</p>

      <div class="contact-row">
        <a class="contact-item" href="mailto:joaquin@byagentx.ai">
          <!-- Email icon -->
          <svg class="contact-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="3" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1.5 4L8 9.5L14.5 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          joaquin@byagentx.ai
        </a>

        <a class="contact-item" href="https://byagentx.ai" target="_blank" rel="noopener">
          <!-- Globe icon -->
          <svg class="contact-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1.5C8 1.5 5.5 4.5 5.5 8C5.5 11.5 8 14.5 8 14.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1.5C8 1.5 10.5 4.5 10.5 8C10.5 11.5 8 14.5 8 14.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1.5 8H14.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          byagentx.ai
        </a>
      </div>

    </div>
  </div>
</body>
</html>
