<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,Helvetica,sans-serif;background:#fff;color:#000;min-height:100vh;padding-bottom:120px}

/* HEADER */
#header{background:#242323;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
#header .brand{display:flex;align-items:center;gap:10px}
#header .logo{height:44px;width:44px;object-fit:contain;border-radius:4px}
#header .brand-text .name{color:#fff;font-size:18px;font-weight:700;letter-spacing:1px}
#header .brand-text .sub{color:#8cbb23;font-size:12px;font-weight:600;letter-spacing:0.5px}
#cart-btn{background:none;border:none;cursor:pointer;position:relative;padding:4px}
#cart-btn .icon{font-size:26px}
#cart-count{position:absolute;top:-2px;right:-2px;background:#8cbb23;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;display:none}

/* CATEGORY TABS */
#cat-tabs{background:#fff;border-bottom:2px solid #f0f0f0;overflow-x:auto;white-space:nowrap;padding:8px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;position:sticky;top:68px;z-index:99}
#cat-tabs::-webkit-scrollbar{display:none}
.tab{display:inline-block;padding:7px 14px;margin-right:6px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#f5f5f5;color:#242323;border:none;transition:all 0.2s;white-space:nowrap}
.tab.active{background:#8cbb23;color:#fff}

/* MENU SECTIONS */
#menu-content{padding:0 12px}
.cat-section{padding:16px 0 8px}
.cat-title{font-size:20px;font-weight:700;color:#242323;padding:8px 0 12px;border-bottom:3px solid #8cbb23;margin-bottom:12px;text-transform:uppercase;letter-spacing:0.5px}

/* CARDS GRID */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
@media(min-width:600px){.items-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
@media(min-width:900px){.items-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}}

.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.09);display:flex;flex-direction:column;position:relative}
.card-img{width:100%;height:130px;object-fit:cover;display:block;background:#f5f5f5}
.card-img-placeholder{width:100%;height:130px;background:linear-gradient(135deg,#f5f5f5,#e0e0e0);display:flex;align-items:center;justify-content:center;font-size:32px}
.card-body{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column}
.card-name{font-size:12px;font-weight:700;color:#242323;text-transform:uppercase;margin-bottom:3px;line-height:1.3}
.card-desc{font-size:11px;color:#888;line-height:1.3;flex:1;margin-bottom:6px}
.labels{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.label{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px}
.label-suave{background:#e8f5e9;color:#388e3c}
.label-picante{background:#fce4ec;color:#c62828}
.label-fish{background:#e3f2fd;color:#1565c0}
.label-new{background:#fff8e1;color:#f57f17}
.label-dulce{background:#fce4ec;color:#ad1457}
.label-especialidad{background:#f3e5f5;color:#6a1b9a}
.label-default{background:#f5f5f5;color:#666}

.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.card-price{font-size:14px;font-weight:700;color:#8cbb23}
.add-btn{background:#8cbb23;color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:transform 0.1s}
.add-btn:active{transform:scale(0.9)}

/* CART DRAWER */
#cart-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200}
#cart-overlay.open{display:block}
#cart-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;max-height:80vh;display:flex;flex-direction:column;z-index:201;transform:translateY(100%);transition:transform 0.3s ease}
#cart-drawer.open{transform:translateY(0)}
#cart-header{padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
#cart-header h2{font-size:18px;font-weight:700;color:#242323}
#cart-close{background:none;border:none;font-size:24px;cursor:pointer;color:#666;padding:4px}
#cart-items{overflow-y:auto;flex:1;padding:12px 16px}
.cart-empty{text-align:center;padding:40px 20px;color:#aaa;font-size:15px}
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5}
.ci-name{flex:1;font-size:13px;font-weight:600;color:#242323}
.ci-price{font-size:12px;color:#888;margin-top:2px}
.qty-ctrl{display:flex;align-items:center;gap:6px}
.qty-btn{background:#f5f5f5;border:none;border-radius:50%;width:26px;height:26px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;color:#242323}
.qty-btn:hover{background:#8cbb23;color:#fff}
.qty-num{min-width:20px;text-align:center;font-size:14px;font-weight:700}
.ci-subtotal{font-size:14px;font-weight:700;color:#8cbb23;min-width:52px;text-align:right}
#cart-footer{padding:16px 20px;border-top:2px solid #f0f0f0}
#cart-total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
#cart-total-row span{font-size:16px;font-weight:700;color:#242323}
#cart-total{font-size:22px;font-weight:700;color:#8cbb23}
#wa-btn{display:block;width:100%;background:#25d366;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:0.3px}
#wa-btn:hover{background:#1ebe5a}

/* FLOATING WA BUTTON */
#wa-float{position:fixed;bottom:24px;right:16px;background:#25d366;color:#fff;border:none;border-radius:50%;width:56px;height:56px;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(37,211,102,0.5);z-index:150;text-decoration:none}
#wa-float:hover{background:#1ebe5a;transform:scale(1.05)}

/* SCROLL TO TOP */
.scroll-top{display:none}
</style>

// State
const cart = {};

// Leer número de WhatsApp del parámetro ?from= en la URL
// El bot manda el link con ?from=NUMERO para que el pedido regrese a la misma conversación
const urlParams = new URLSearchParams(window.location.search);
const WA_NUMBER = urlParams.get('from') || '14155238886';

// Label styling
function getLabelClass(label) {
  const l = label.toLowerCase();
  if (l === 'suave') return 'label-suave';
  if (l === 'picante') return 'label-picante';
  if (l === 'fish') return 'label-fish';
  if (l === 'new' || l === 'nuevo') return 'label-new';
  if (l === 'dulce') return 'label-dulce';
  if (l.includes('especialidad')) return 'label-especialidad';
  return 'label-default';
}

function getCatSlug(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
}

function formatPrice(n) {
  return '$' + Math.ceil(n * 1.05).toLocaleString('es-MX');
}

// Build tabs
function buildTabs() {
  const tabs = document.getElementById('cat-tabs');
  const cats = Object.keys(MENU_DATA.menu);
  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.dataset.cat = getCatSlug(cat);
    btn.onclick = () => scrollToCategory(getCatSlug(cat), btn);
    tabs.appendChild(btn);
  });
}

function scrollToCategory(slug, btn) {
  const el = document.getElementById('cat-' + slug);
  if (!el) return;
  const offset = 68 + 48; // header + tabs height
  const top = el.getBoundingClientRect().top + window.scrollY - offset;
  window.scrollTo({ top, behavior: 'smooth' });
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  (btn || document.querySelector(`[data-cat="${slug}"]`))?.classList.add('active');
}

// Build menu
function buildMenu() {
  const content = document.getElementById('menu-content');
  const cats = Object.keys(MENU_DATA.menu);
  cats.forEach(cat => {
    const slug = getCatSlug(cat);
    const catData = MENU_DATA.menu[cat];
    const section = document.createElement('div');
    section.className = 'cat-section';
    section.id = 'cat-' + slug;

    let html = `<div class="cat-title">${cat}</div><div class="items-grid">`;
    catData.items.forEach(item => {
      const price = item.priceNum ? formatPrice(item.priceNum) : (item.displayPrice || '');
      const imgSrc = item.imageUrl || `img/cat-${slug}.jpg`;
      const labelsHtml = (item.labels || []).map(l =>
        `<span class="label ${getLabelClass(l)}">${l}</span>`
      ).join('');

      const imgEl = item.imageUrl
        ? `<img class="card-img" src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>🍣</div>'">`
        : `<div class="card-img-placeholder">🍣</div>`;

      html += `<div class="card">
        ${imgEl}
        <div class="card-body">
          <div class="card-name">${item.name}</div>
          <div class="card-desc">${item.description || ''}</div>
          ${labelsHtml ? `<div class="labels">${labelsHtml}</div>` : ''}
          <div class="card-footer">
            <span class="card-price">${price}</span>
            <button class="add-btn" onclick='addToCart(${JSON.stringify(item.name)}, ${item.priceNum || 0}, ${JSON.stringify(price)})'>+</button>
          </div>
        </div>
      </div>`;
    });
    html += '</div>';
    section.innerHTML = html;
    content.appendChild(section);
  });
}

// CART
function addToCart(name, priceNum, displayPrice) {
  if (!cart[name]) {
    cart[name] = { name, priceNum, displayPrice, qty: 0 };
  }
  cart[name].qty++;
  updateCartBadge();
  renderCart();
  // Brief flash of cart button
  const btn = document.getElementById('cart-btn');
  btn.style.transform = 'scale(1.2)';
  setTimeout(() => btn.style.transform = '', 200);
}

function removeFromCart(name) {
  if (!cart[name]) return;
  cart[name].qty--;
  if (cart[name].qty <= 0) delete cart[name];
  updateCartBadge();
  renderCart();
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cart-count');
  badge.textContent = total;
  badge.style.display = total > 0 ? 'flex' : 'none';
}

function renderCart() {
  const container = document.getElementById('cart-items');
  const items = Object.values(cart);
  if (items.length === 0) {
    container.innerHTML = '<div class="cart-empty">Tu carrito está vacío 🍣</div>';
    document.getElementById('cart-total').textContent = '$0';
    document.getElementById('wa-btn').href = 'https://wa.me/' + WA_NUMBER + '';
    return;
  }

  let html = '';
  let totalCents = 0;
  items.forEach(item => {
    // Use displayPrice (already includes +5%) to avoid double-applying the surcharge
    const unitPrice = parseInt((item.displayPrice || '').replace(/[^0-9]/g, ''), 10) || Math.ceil(item.priceNum * 1.05);
    const subtotal = unitPrice * item.qty;
    totalCents += subtotal;
    html += `<div class="cart-item">
      <div style="flex:1">
        <div class="ci-name">${item.name}</div>
        <div class="ci-price">${item.displayPrice} c/u</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick='removeFromCart(${JSON.stringify(item.name)})'>−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick='addToCart(${JSON.stringify(item.name)}, ${item.priceNum}, ${JSON.stringify(item.displayPrice)})'>+</button>
      </div>
      <div class="ci-subtotal">$${subtotal.toLocaleString('es-MX')}</div>
    </div>`;
  });

  container.innerHTML = html;
  document.getElementById('cart-total').textContent = '$' + totalCents.toLocaleString('es-MX');

  // Build WhatsApp message
  let msg = '🍣 *Pedido Sushi Seven*\n\n';
  items.forEach(item => {
    const unitPrice = parseInt((item.displayPrice || '').replace(/[^0-9]/g, ''), 10) || Math.ceil(item.priceNum * 1.05);
    const subtotal = unitPrice * item.qty;
    msg += `• ${item.qty}x ${item.name} — $${subtotal.toLocaleString('es-MX')}\n`;
  });
  msg += `\n*Total: $${totalCents.toLocaleString('es-MX')}*\n\nQuiero ordenar a domicilio, por favor 🙏`;
  const waUrl = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg);
  document.getElementById('wa-btn').href = waUrl;
  document.getElementById('wa-float').href = items.length > 0 ? waUrl : 'https://wa.me/' + WA_NUMBER + '';
}

function toggleCart() {
  const overlay = document.getElementById('cart-overlay');
  const drawer = document.getElementById('cart-drawer');
  const isOpen = drawer.classList.contains('open');
  if (isOpen) {
    drawer.classList.remove('open');
    overlay.classList.remove('open');
  } else {
    renderCart();
    drawer.classList.add('open');
    overlay.classList.add('open');
  }
}

// Scroll spy
function setupScrollSpy() {
  const sections = document.querySelectorAll('.cat-section');
  const tabs = document.querySelectorAll('.tab');
  const offset = 68 + 48 + 10;

  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        let current = null;
        sections.forEach(s => {
          const top = s.getBoundingClientRect().top;
          if (top <= offset + 20) current = s.id.replace('cat-', '');
        });
        if (current) {
          tabs.forEach(t => {
            t.classList.toggle('active', t.dataset.cat === current);
          });
          // scroll active tab into view
          const activeTab = document.querySelector(`.tab.active`);
          if (activeTab) {
            activeTab.scrollIntoView({ inline: 'nearest', behavior: 'smooth', block: 'nearest' });
          }
        }
        ticking = false;
      });
      ticking = true;
    }
  });
}

// Init
buildTabs();
buildMenu();
setupScrollSpy();
renderCart();
</script>
